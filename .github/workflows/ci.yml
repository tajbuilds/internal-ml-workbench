name: ci

on:
  push:
  pull_request:

jobs:
  lint-test-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Tests
        run: pytest

      - name: Streamlit smoke
        run: |
          streamlit run streamlit_app.py --server.headless true --server.port 8501 > streamlit.log 2>&1 &
          sleep 12
          curl --fail http://127.0.0.1:8501
