services:
  automl-workbench:
    image: ghcr.io/tajbuilds/internal-ml-workbench:${IMW_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_DATA_DIR: /data
    ports:
      - "${APP_PORT:-8501}:8501"
    volumes:
      - "${WORKBENCH_DATA_LOCATION:-./data}:/data"
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5)
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true

networks: {}
