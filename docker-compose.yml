services:
  automl-workbench:
    container_name: automl_workbench
    image: ${IMAGE_NAME:-internal-ml-workbench:latest}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      WORKBENCH_DATA_FILE: /data/sourcedata.csv
    ports:
      - "${APP_PORT:-8501}:8501"
    volumes:
      - workbench-data:/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5)
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  workbench-data: {}

networks: {}
