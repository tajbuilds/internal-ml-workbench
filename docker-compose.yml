services:
  automl-workbench:
    container_name: automl_workbench
    image: ghcr.io/tajbuilds/internal-ml-workbench:${IMW_VERSION:-latest}
    env_file:
      - .env
    environment:
      WORKBENCH_DATA_FILE: /data/sourcedata.csv
    ports:
      - "${APP_PORT:-8501}:8501"
    volumes:
      - ${WORKBENCH_DATA_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5)
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks: {}
